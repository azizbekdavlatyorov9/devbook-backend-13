openapi: 3.0.0

info:
  title: Devbook API
  version: 1.0.0
  description: API documentation for Devbook application

  servers:
    - url: http://localhost:4001
      description: Local development server
          path:
          post:
            tags:
              - Authorization
              summary: User registration
              description: Create a new user account and send OTP code to email
              requestBody:
                required: true
                content:
                  application/json:
                    schema:
                      type: object
                      required:
                        - username
                        - email
                        - password
                      properties:
                        username:
                          type: string
                          default: azizbek
                        email:
                          type: string
                          example:

