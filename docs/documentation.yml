                published_year:
                  type: string
                  default: "2020"
                pages:
                  type: string
                  default: "350"  
                genre:
                  type: string
                  default: "Fiction"
                details:
                  type: string
                  default: "The Great Novel is a captivating story that explores the complexities of human relationships and the power of love. Set in a small town, the novel follows the lives of several characters as they navigate through their personal struggles and triumphs. With its rich storytelling and well-developed characters, The Great Novel has become a beloved classic that continues to resonate with readers of all ages."
                publisher:
                  type: string
                  default: "Penguin Books"
                period: 
                  type: string
                  default: "Temuriylar davri" 
                quotes:
                  type: string
                  default: "The Great Novel is a masterpiece that will leave you breathless."
              required:
                - title
